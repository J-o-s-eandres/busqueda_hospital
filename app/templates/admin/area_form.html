{% extends "base.html" %}
{% block title %}{{ "Editar" if item else "Nueva" }} Área{% endblock %}
{% block content %}
<div class="container mt-4" style="max-width:500px;">
  <div class="card p-4">
    <h2 class="mb-4">{{ "Editar" if item else "Nueva" }} Área</h2>
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Nombre del área</label>
        <input type="text" class="form-control" name="nombre" value="{{ item.nombre if item else '' }}" required minlength="3">
        <div class="form-text text-muted">Mínimo 3 caracteres. Se guardará en minúsculas.</div>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">{{ "Actualizar" if item else "Crear" }}</button>
        <a href="{{ url_for('admin.areas') }}" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
